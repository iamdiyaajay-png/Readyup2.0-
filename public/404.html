<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ReadyUp 2.0</title>
    <script>
      // Single Page App redirect for GitHub Pages project sites
      // Converts direct visits like /repo-name/admin into /repo-name/#/admin
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/#' +
        '/' + l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
        (l.search ? l.search : '') +
        (l.hash ? l.hash : '')
      );
    </script>
  </head>
  <body>
  </body>
</html>
